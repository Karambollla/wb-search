services:
  nats:
    image: nats:2.10-alpine
    container_name: nats
    ports:
      - "4222:4222"

  app:
    container_name: app
    build: .
    depends_on:
      - nats
    environment:
      HTTP_ADDR: ":8080"
      GRPC_ADDR: ":9090"
      NATS_URL: "nats://nats:4222"
      NATS_SUBJECT: "search.events"
      WINDOW: "5m"
      BUCKET_DURATION: "5s"
      REFRESH_EVERY: "2s"
      FRAUD_TTL: "1m"
      MAX_TOP_SIZE: "100"
    ports:
      - "8080:8080"
      - "9090:9090"

  tests:
    image: wb-search-tests:latest
    build: ./tests
    depends_on:
      - app
      - nats
    environment:
      ADDRESS: "http://localhost:8080"
      NATS_URL: "nats://localhost:4222"

services:
  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"

  app:
    build: .
    depends_on:
      - nats
    environment:
      HTTP_ADDR: ":8080"
      GRPC_ADDR: ":9090"
      NATS_URL: "nats://nats:4222"
      NATS_SUBJECT: "search.events"
      WINDOW: "5m"
      BUCKET_DURATION: "5s"
      REFRESH_EVERY: "2s"
      FRAUD_TTL: "1m"
      MAX_TOP_SIZE: "100"
    ports:
      - "8080:8080"
      - "9090:9090"
